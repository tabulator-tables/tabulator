<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tabulator Example — 06 Grouping & Calculations</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="../dist/css/tabulator_bootstrap5.css" />
  <script src="../dist/js/tabulator.js"></script>
</head>
<body>
  <main class="container py-4">
    <h1>06 · Grouping &amp; Column Calculations</h1>
    <p>
      Rows are grouped by department (click a group header to collapse it). Column
      calculation rows show the average age and the total &amp; max revenue, both per-group
      and for the whole table.
      <a href="index.html">← back to index</a>
    </p>

    <div id="example-table"></div>
  </main>

  <script>
    var tabledata = [
      { id: 1, name: "Oli Bob",    dept: "Engineering", age: 28, revenue: 12000 },
      { id: 2, name: "Mary May",   dept: "Sales",       age: 41, revenue: 48000 },
      { id: 3, name: "Chris L.",   dept: "Engineering", age: 22, revenue: 9000 },
      { id: 4, name: "Brendon P.", dept: "Marketing",   age: 35, revenue: 21000 },
      { id: 5, name: "Margret M.", dept: "Sales",       age: 26, revenue: 33500 },
      { id: 6, name: "Van Ng",     dept: "Engineering", age: 51, revenue: 27000 },
      { id: 7, name: "Duc Ng",     dept: "Marketing",   age: 29, revenue: 15500 },
      { id: 8, name: "Anita Bath", dept: "Sales",       age: 33, revenue: 52000 },
    ];

    var table = new Tabulator("#example-table", {
      data: tabledata,
      layout: "fitColumns",

      groupBy: "dept",                                   // group rows by this field
      groupStartOpen: true,
      // Custom group header showing the department and its row count.
      groupHeader: function (value, count) {
        return value + " <span style='color:#888'>(" + count + " " + (count === 1 ? "person" : "people") + ")</span>";
      },

      columns: [
        { title: "Name", field: "name", sorter: "string" },
        { title: "Department", field: "dept", sorter: "string" },
        { title: "Age", field: "age", sorter: "number", hozAlign: "right",
          bottomCalc: "avg", bottomCalcParams: { precision: 1 } },     // average age
        { title: "Revenue", field: "revenue", sorter: "number", hozAlign: "right",
          formatter: "money", formatterParams: { symbol: "$", precision: 0, thousand: "," },
          topCalc: "max",                                              // highest in group/table
          topCalcFormatter: "money", topCalcFormatterParams: { symbol: "$", precision: 0, thousand: "," },
          bottomCalc: "sum",                                           // total
          bottomCalcFormatter: "money", bottomCalcFormatterParams: { symbol: "$", precision: 0, thousand: "," } },
      ],
    });
  </script>
</body>
</html>
