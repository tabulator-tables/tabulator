<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tabulator Example — 09 Tree Data</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="../dist/css/tabulator_bootstrap5.css" />
  <script src="../dist/js/tabulator.js"></script>
</head>
<body>
  <main class="container py-4">
    <h1>09 · Nested Tree Data</h1>
    <p>
      Hierarchical data using <code>dataTree</code>. Each row can have a <code>_children</code>
      array; click the expand/collapse toggle to reveal nested rows. The size column totals
      across the whole tree.
      <a href="index.html">← back to index</a>
    </p>

    <div class="d-flex flex-wrap gap-2 mb-3">
      <button id="expand-all" class="btn btn-primary">Expand all</button>
      <button id="collapse-all" class="btn btn-secondary">Collapse all</button>
    </div>

    <div id="example-table"></div>
  </main>

  <script>
    // Nested data: folders contain files/sub-folders via `_children`.
    var tabledata = [
      { name: "src", type: "folder", size: 0, _children: [
        { name: "js", type: "folder", size: 0, _children: [
          { name: "core.js", type: "file", size: 48 },
          { name: "modules.js", type: "file", size: 120 },
        ] },
        { name: "scss", type: "folder", size: 0, _children: [
          { name: "tabulator.scss", type: "file", size: 31 },
          { name: "themes", type: "folder", size: 0, _children: [
            { name: "midnight.scss", type: "file", size: 6 },
            { name: "modern.scss", type: "file", size: 7 },
          ] },
        ] },
      ] },
      { name: "dist", type: "folder", size: 0, _children: [
        { name: "tabulator.js", type: "file", size: 520 },
        { name: "tabulator.css", type: "file", size: 90 },
      ] },
      { name: "README.md", type: "file", size: 12 },
    ];

    var table = new Tabulator("#example-table", {
      data: tabledata,
      layout: "fitColumns",
      dataTree: true,                       // enable tree mode
      dataTreeStartExpanded: false,         // start collapsed
      columns: [
        { title: "Name", field: "name", sorter: "string", widthGrow: 3 },   // toggle shows on first column
        { title: "Type", field: "type", sorter: "string" },
        { title: "Size (KB)", field: "size", sorter: "number", hozAlign: "right",
          bottomCalc: "sum" },              // sum spans the entire tree
      ],
    });

    document.getElementById("expand-all").addEventListener("click", function () {
      table.getRows().forEach(function expand(row) {
        row.treeExpand();
        row.getTreeChildren().forEach(expand);
      });
    });
    document.getElementById("collapse-all").addEventListener("click", function () {
      table.getRows().forEach(function collapse(row) {
        row.getTreeChildren().forEach(collapse);
        row.treeCollapse();
      });
    });
  </script>
</body>
</html>
